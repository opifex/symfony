nelmio_cors:
  defaults:
    origin_regex: true
    allow_origin: [ '%env(CORS_ALLOW_ORIGIN)%' ]
    allow_methods: [ 'GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE' ]
    allow_headers: [ 'Content-Type', 'Authorization', 'X-Correlation-Id' ]
    expose_headers: [ 'X-Correlation-Id' ]
    max_age: 3600
  paths:
    '^/': null
